<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Магазин{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAF7F2;
            --color-ink: #1F1B16;
            --color-accent: #B5502E;
            --color-accent-dark: #93401F;
            --color-muted: #8A8275;
            --color-card: #FFFFFF;
            --color-border: #E8E2D6;
            --font-display: 'Fraunces', Georgia, serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background: var(--color-bg);
            color: var(--color-ink);
            font-family: var(--font-body);
        }

        h1, h2, h3, .navbar-brand {
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .navbar {
            background: var(--color-ink) !important;
        }

        .navbar-brand {
            font-size: 1.4rem;
        }

        .nav-link {
            font-family: var(--font-body);
            font-size: 0.92rem;
        }

        .btn-primary, .btn-accent {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: #fff;
        }
        .btn-primary:hover, .btn-accent:hover {
            background: var(--color-accent-dark);
            border-color: var(--color-accent-dark);
            color: #fff;
        }

        .auth-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            box-shadow: 0 1px 3px rgba(31, 27, 22, 0.04), 0 8px 24px rgba(31, 27, 22, 0.06);
            padding: 2.75rem 2.5rem;
        }

        .auth-eyebrow {
            font-family: var(--font-body);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
        }

        .auth-title {
            font-size: 1.85rem;
            margin-bottom: 0.4rem;
        }

        .auth-subtitle {
            color: var(--color-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .auth-card .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-ink);
        }

        .auth-card .form-control {
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 0.65rem 0.85rem;
            background: #FCFBF8;
        }

        .auth-card .form-control:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(181, 80, 46, 0.12);
            background: #fff;
        }

        .auth-card .form-text {
            font-size: 0.8rem;
            color: var(--color-muted);
        }

        .auth-card .invalid-feedback,
        .auth-card .errorlist {
            color: #A33A2C;
            font-size: 0.82rem;
            list-style: none;
            padding: 0;
            margin-top: 0.25rem;
        }

        .auth-footer-link {
            text-align: center;
            margin-top: 1.75rem;
            font-size: 0.9rem;
            color: var(--color-muted);
        }
        .auth-footer-link a {
            color: var(--color-accent);
            font-weight: 500;
            text-decoration: none;
        }
        .auth-footer-link a:hover {
            text-decoration: underline;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--color-bg);
            box-shadow: 0 0 0 1px var(--color-border);
        }

        .profile-avatar-placeholder {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: var(--color-ink);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 2.1rem;
        }

        .profile-field-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--color-muted);
            margin-bottom: 0.15rem;
        }

        .profile-field-value {
            font-size: 1.02rem;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'catalog:product_list' %}">Магазин</a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                {% if user.is_authenticated %}
                    <a class="nav-link text-light d-inline" href="{% url 'users:profile' %}">{{ user.username }}</a>
                    <form method="post" action="{% url 'users:logout' %}" class="d-inline m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-light">Выйти</button>
                    </form>
                {% else %}
                    <a class="nav-link text-light d-inline" href="{% url 'users:login' %}">Войти</a>
                    <a class="btn btn-sm btn-accent" href="{% url 'users:register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <small>&copy; 2025 Магазин</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
